spring.application.name=orbital-api
server.port=8080
orbital.allowed-origins=http://localhost:3000
orbital.celestrak.group=active
orbital.celestrak.limit=180
orbital.celestrak.cache-duration=PT5M
orbital.celestrak.tle-fallback-path=/NORAD/elements/gp.php?GROUP=stations&FORMAT=tle
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
